<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertStudio | Local Certificate Issuer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;700&family=Dancing+Script:wght@400;700&family=Great+Vibes&family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div>
                <h1>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15l-2 5l9-5l-9-5l2 5z"></path><path d="M8 12a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"></path><path d="M12 20v-4"></path><path d="M12 8v-4"></path><path d="M4 12h4"></path><path d="M16 12h4"></path></svg>
                    CertStudio
                </h1>
                <p>100% Local & Private. Works directly from your folder.</p>
            </div>
        </header>

        <div class="main-content">
            <aside class="controls-panel">
                <section class="control-group">
                    <h2>1. Upload Template</h2>
                    <p class="help-text">Select a high-resolution Image (PNG/JPG) or PDF file.</p>
                    <input type="file" id="template-upload" accept="image/*,application/pdf" title="Click or drag to upload template">
                </section>

                <section class="control-group">
                    <h2>2. Student Data</h2>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="tab-text">Quick Paste</button>
                        <button class="tab-btn" data-tab="tab-file">Upload File</button>
                    </div>
                    
                    <div id="tab-text" class="tab-content active">
                        <textarea id="names-textarea" rows="4" placeholder="e.g.&#10;John Doe&#10;Jane Smith"></textarea>
                    </div>

                    <div id="tab-file" class="tab-content" style="display: none;">
                        <input type="file" id="data-upload" accept=".csv,.tsv,.txt">
                        <button id="download-template-btn" class="secondary-btn">Download CSV Template</button>
                    </div>
                </section>

                <section class="control-group">
                    <h2>3. Editor Controls</h2>
                    <div class="editor-buttons">
                        <button id="add-name-btn" class="add-field-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Add [Name]
                        </button>
                        <button id="add-date-btn" class="add-field-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Add [Date]
                        </button>
                        <button id="add-id-btn" class="add-field-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="14" rx="2"/><path d="M12 11v4"/></svg>
                            Add [ID Number]
                        </button>
                    </div>
                    
                    <div class="alignment-controls" id="alignment-controls" style="display: none; margin-top: 1rem;">
                        <div style="display: flex; gap: 0.5rem;">
                            <button id="center-h-btn" class="secondary-btn" style="margin-top:0; flex:1;" title="Center Horizontally">↔ Center H</button>
                            <button id="center-v-btn" class="secondary-btn" style="margin-top:0; flex:1;" title="Center Vertically">↕ Center V</button>
                        </div>
                    </div>
                    
                    <div class="styling-controls" id="styling-controls" style="display: none;">
                        <h4>Inspector</h4>
                        <label>Size: <input type="number" id="font-size" value="60" min="10" max="500"></label>
                        <label>Color: 
                            <div class="color-control-wrapper">
                                <div class="color-presets">
                                    <button class="color-swatch" data-color="#000000" style="background: #000000;"></button>
                                    <button class="color-swatch" data-color="#ffffff" style="background: #ffffff;"></button>
                                    <button class="color-swatch" data-color="#1e3a8a" style="background: #1e3a8a;"></button>
                                    <button class="color-swatch" data-color="#b91c1c" style="background: #b91c1c;"></button>
                                    <button class="color-swatch" data-color="#15803d" style="background: #15803d;"></button>
                                </div>
                                <input type="color" id="text-color" value="#000000">
                            </div>
                        </label>
                        <label>Align: 
                            <select id="text-align">
                                <option value="left">Left</option>
                                <option value="center">Center</option>
                                <option value="right">Right</option>
                            </select>
                        </label>
                        <label>Font: 
                            <select id="font-family">
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Arial">Modern Sans</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Lora">Lora</option>
                                <option value="Cinzel">Cinzel</option>
                                <option value="Dancing Script">Dancing Script</option>
                                <option value="Great Vibes">Great Vibes</option>
                            </select>
                        </label>
                        <button id="delete-selected-btn" class="danger-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            Delete Selected
                        </button>
                    </div>
                </section>

                <section class="control-group action-group" style="border-bottom: none;">
                    <h2>4. Export Settings</h2>
                    <div class="output-options">
                        <label class="radio-label" title="Safest. Burns text into image.">
                            <input type="radio" name="output-format" value="image" checked>
                            <span>Image PDF (Fast & Secure)</span>
                        </label>
                        <label class="radio-label" title="Keeps text selectable.">
                            <input type="radio" name="output-format" value="text">
                            <span>Text over PDF (Selectable)</span>
                        </label>
                    </div>
                    <button id="generate-btn" class="primary-btn" style="margin-top: 1.5rem;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Export Certificates
                    </button>
                    <div id="progress-container" style="display: none;">
                        <div class="progress-bar"><div id="progress-fill"></div></div>
                        <p id="progress-text">0 / 0 generating...</p>
                    </div>
                </section>
            </aside>

            <main class="editor-panel">
                <div class="zoom-controls">
                    <button id="zoom-out-btn" title="Zoom Out"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                    <button id="zoom-reset-btn" title="Fit to Screen">FIT</button>
                    <button id="zoom-in-btn" title="Zoom In"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
                </div>
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <canvas id="certificate-canvas"></canvas>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
